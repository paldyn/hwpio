name: CI

on:
  push:
    branches: [main, devel]
    tags: ['v*']
    paths-ignore:
      - 'mydocs/**'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
      - 'rhwp-logo.*'
  pull_request:
    branches: [main, devel]
    paths-ignore:
      - 'mydocs/**'
      - 'docs/**'
      - 'samples/**'
      - 'assets/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
      - 'rhwp-logo.*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      # [Task #1109] ubuntu-latest runner 의 미사용 사전 설치 toolchain 제거하여
      # cargo test (28 examples + integration tests) 빌드 시 디스크 한도 초과 방지.
      # 메인테이너 레포 설정 cache 한도 증가 (10→15GB, 7→3일) 와 함께 다층 안전망.
      - name: Free disk space (remove unused pre-installed toolchains)
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Build
        run: cargo build --verbose

      - name: Canvas layer parity tests
        run: cargo test canvas_layer_tree_matches_legacy --lib --verbose

      - name: Check WASM target
        run: cargo check --target wasm32-unknown-unknown --lib

      - name: Install native Skia runtime packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            libfontconfig1-dev \
            libfreetype6-dev

      - name: Native Skia tests
        run: cargo test --features native-skia skia --lib --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Clippy
        run: cargo clippy -- -D warnings

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v5

      # [Task #1109] wasm-build job 도 build-and-test 와 동일 패턴 (선제적 안전망).
      # WASM 빌드 산출물 크기 + wasm-pack 도구 + cargo cache 누적 영역 보호.
      - name: Free disk space (remove unused pre-installed toolchains)
        run: |
          sudo apt-get clean
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          df -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Build WASM
        run: wasm-pack build --target web --release

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rhwp-wasm-pkg
          path: pkg/
          retention-days: 30
