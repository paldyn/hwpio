name: Deploy to GitHub Pages

# Pages 소스가 "Deploy from a branch (gh-pages)" 로 설정되어 있어,
# 빌드 산출물을 gh-pages 브랜치에 푸시하는 방식으로 배포한다.
# (artifact 기반 actions/deploy-pages 는 legacy/branch 모드와 호환되지 않음)

on:
  push:
    branches: [main]
    paths-ignore:
      - 'mydocs/**'
      - 'docs/**'
      - 'samples/**'
      - 'pdf/**'
      - 'pdf-large/**'
      - 'pdf-2020/**'
      - 'pdf-2010/**'
      - 'tests/**'
      - 'examples/**'
      - 'npm/**'
      - 'rhwp-firefox/**'
      - 'rhwp-chrome/**'
      - 'rhwp-vscode/**'
      - 'rhwp-shared/**'
      - 'rhwp-desktop/**'
      - '*.md'
      - 'LICENSE'
      - 'CLAUDE.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/FUNDING.yml'
      - '.github/CODE_OF_CONDUCT.md'
      - '.github/SECURITY.md'
      - '.github/pull_request_template.md'
      - '.github/dependabot.yml'
      - 'rhwp-logo.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Push to gh-pages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      # --- WASM 빌드 ---
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-wasm-

      - name: Build WASM
        run: wasm-pack build --target web --release

      # --- rhwp-studio 빌드 ---
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: rhwp-studio
        run: npm install

      - name: Copy WASM to public
        run: |
          cp pkg/rhwp_bg.wasm rhwp-studio/public/
          cp pkg/rhwp.js rhwp-studio/public/

      - name: Copy favicon
        run: cp assets/logo/favicon.ico rhwp-studio/public/favicon.ico

      - name: Build rhwp-studio
        working-directory: rhwp-studio
        run: npx vite build --base=/

      # --- gh-pages 브랜치에 푸시 (단일 커밋 유지) ---
      - name: Push to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: rhwp-studio/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.sha }}'
